<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精讲课 - 中学古文</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: #f7f3ec;
    color: #2f2a23;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .shell {
    width: min(960px, 100%);
    margin: 0 auto;
    min-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 {
    font-size: 30px;
    margin-bottom: 28px;
    color: #2f2a23;
  }
  .input-wrapper {
    width: 100%;
    max-width: 460px;
  }
  .input-wrapper input {
    width: 100%;
    padding: 16px 20px;
    border: 1px solid #d9cbb9;
    border-radius: 8px;
    font-size: 16px;
    text-align: center;
    background: #fff;
    color: #333;
    transition: box-shadow 0.2s;
  }
  .input-wrapper input:focus {
    outline: none;
    box-shadow: 0 0 0 4px rgba(145, 108, 69, 0.16);
  }
  .input-wrapper input::placeholder {
    color: #999;
  }
  button.submit {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: #5c3d2e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button.submit:hover { background: #442d22; }
  button.submit:active { transform: translateY(1px); }
  button.submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .status {
    margin-top: 30px;
    text-align: center;
    font-size: 14px;
    color: #6f6255;
    min-height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .status.running { color: #9b6b25; }
  .status.success { color: #3f7b45; }
  .status.error { color: #b44336; }
  .status.need-scope { color: #9b6b25; max-width: 640px; line-height: 1.7; }
  .download-btn {
    display: inline-block;
    padding: 9px 18px;
    background: #3f7b45;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
  }
  .download-btn:hover { background: #33683a; }
  .recover-link {
    display: none;
    width: 100%;
    margin-top: 6px;
    color: #8a735d;
    font-size: 13px;
    text-decoration: none;
  }
  .recover-link:hover { text-decoration: underline; }
  .preview {
    display: none;
    width: 100%;
    margin-top: 28px;
    border: 1px solid #d9cbb9;
    border-radius: 8px;
    background: #fff;
    overflow: hidden;
    height: min(720px, 70vh);
  }
  .preview iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(155,107,37,0.25);
    border-top: 2px solid #9b6b25;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <main class="shell">
    <h1>精讲课 - 中学古文</h1>

    <form id="generateForm" class="input-wrapper">
      <input type="text" id="lesson" name="lesson" placeholder="如：木兰词 第一段" required>
      <button type="submit" class="submit" id="submitBtn">生成 PPT</button>
    </form>

    <div class="status" id="statusBox">
      <span id="statusText"></span>
      <a id="downloadLink" class="download-btn" style="display:none;">下载 PPT</a>
      <a id="recoverLink" class="recover-link" target="_blank" rel="noopener">保存这个链接，稍后可回来查看结果</a>
    </div>

    <div class="preview" id="previewBox">
      <iframe id="previewFrame" title="PPT 讲解预览"></iframe>
    </div>
  </main>

<script>
  const form = document.getElementById('generateForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusBox = document.getElementById('statusBox');
  const statusText = document.getElementById('statusText');
  const downloadLink = document.getElementById('downloadLink');
  const recoverLink = document.getElementById('recoverLink');
  const previewBox = document.getElementById('previewBox');
  const previewFrame = document.getElementById('previewFrame');

  let currentTaskId = null;
  let currentToken = null;
  let currentPoll = null;

  function getClientId() {
    let id = localStorage.getItem('teachergpt_client_id');
    if (!id) {
      id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
      localStorage.setItem('teachergpt_client_id', id);
    }
    return id;
  }

  function saveTask(taskId, token) {
    localStorage.setItem('teachergpt_last_task', JSON.stringify({ taskId, token }));
  }

  function getTaskFromUrl() {
    const match = location.pathname.match(/^\/task\/([^/]+)$/);
    const token = new URLSearchParams(location.search).get('token');
    if (match && token) {
      return { taskId: match[1], token };
    }
    return null;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const lesson = document.getElementById('lesson').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = '生成中...';
    downloadLink.style.display = 'none';
    recoverLink.style.display = 'none';
    previewBox.style.display = 'none';
    previewFrame.removeAttribute('src');
    statusBox.className = 'status running';
    statusText.innerHTML = '<span class="loading"></span>正在提交任务...';

    try {
      const resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lesson, client_id: getClientId() })
      });
      const data = await resp.json();

      if (!resp.ok) {
        throw new Error(data.detail || '提交失败');
      }

      if (data.status === 'need_scope') {
        showNeedScope(data.message);
        submitBtn.disabled = false;
        submitBtn.textContent = '生成 PPT';
        return;
      }

      currentTaskId = data.task_id;
      currentToken = data.token;
      saveTask(currentTaskId, currentToken);
      showRecover(data.recover_url || (`/task/${currentTaskId}?token=${currentToken}`));

      if (data.status === 'success') {
        showSuccess(data.message, data);
      } else {
        pollTask(currentTaskId, currentToken);
      }

    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = '生成 PPT';
    }
  });

  function pollTask(taskId, token) {
    clearInterval(currentPoll);
    currentPoll = setInterval(async () => {
      try {
        const resp = await fetch(`/api/task/${taskId}?token=${encodeURIComponent(token)}`);
        const data = await resp.json();

        if (data.status === 'pending' || data.status === 'running') {
          showRunning(data.message);
        } else if (data.status === 'success') {
          clearInterval(currentPoll);
          showSuccess(data.message, data);
        } else if (data.status === 'error') {
          clearInterval(currentPoll);
          showError(data.message);
          submitBtn.disabled = false;
          submitBtn.textContent = '生成 PPT';
        }
      } catch (err) {
        showError('查询状态失败');
        clearInterval(currentPoll);
        submitBtn.disabled = false;
        submitBtn.textContent = '生成 PPT';
      }
    }, 2000);
  }

  function showRunning(msg) {
    statusBox.className = 'status running';
    statusText.innerHTML = '<span class="loading"></span>' + msg;
  }

  function showSuccess(msg, data) {
    statusBox.className = 'status success';
    statusText.textContent = '✓ ' + msg;
    downloadLink.href = data.download_url || (`/api/download/${data.task_id}?token=${encodeURIComponent(data.token)}`);
    downloadLink.style.display = 'inline-block';
    if (data.preview_url) {
      previewFrame.src = data.preview_url;
      previewBox.style.display = 'block';
    }
    if (data.recover_url) {
      showRecover(data.recover_url);
    }
    submitBtn.disabled = false;
    submitBtn.textContent = '生成 PPT';
  }

  function showError(msg) {
    statusBox.className = 'status error';
    statusText.textContent = '✗ ' + msg;
  }

  function showNeedScope(msg) {
    statusBox.className = 'status need-scope';
    statusText.textContent = msg;
  }

  function showRecover(url) {
    recoverLink.href = url;
    recoverLink.style.display = 'block';
  }

  async function restoreTask(taskId, token) {
    try {
      submitBtn.disabled = true;
      submitBtn.textContent = '生成中...';
      statusBox.className = 'status running';
      statusText.innerHTML = '<span class="loading"></span>正在恢复任务...';
      const resp = await fetch(`/api/task/${taskId}?token=${encodeURIComponent(token)}`);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || '恢复失败');
      currentTaskId = taskId;
      currentToken = token;
      saveTask(taskId, token);
      showRecover(data.recover_url || (`/task/${taskId}?token=${token}`));
      if (data.status === 'success') {
        showSuccess(data.message, data);
      } else if (data.status === 'error') {
        showError(data.message);
        submitBtn.disabled = false;
        submitBtn.textContent = '生成 PPT';
      } else {
        pollTask(taskId, token);
      }
    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = '生成 PPT';
    }
  }

  async function boot() {
    const fromUrl = getTaskFromUrl();
    if (fromUrl) {
      restoreTask(fromUrl.taskId, fromUrl.token);
      return;
    }
    const saved = localStorage.getItem('teachergpt_last_task');
    if (saved) {
      try {
        const task = JSON.parse(saved);
        if (task.taskId && task.token) {
          restoreTask(task.taskId, task.token);
        }
      } catch (_) {}
    }
  }

  boot();
</script>
</body>
</html>
