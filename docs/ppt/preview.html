<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《爱莲说》精讲</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:#664232;
    font-family:
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    overflow:hidden;
}

.page{
    width:100%;
    height:100%;
    position:relative;
}

/* 标题 */

.title-wrapper{
    position:absolute;
    top:28%;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title{
    color:#ffffff;
    font-size:84px;
    font-weight:700;
    letter-spacing:2px;
}

.author{
    margin-top:60px;
    font-size:34px;
    color:#d3b188;
}

.divider{
    margin-top:36px;
    width:720px;
    height:2px;
    background:#c59d72;
    opacity:.8;
}

/* 技术说明 */

.tech-info{
    position:absolute;
    bottom:36px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;

    color:#d5bb98;

    line-height:1.8;
}

.tech-info .line1{
    font-size:18px;
}

.tech-info .line2{
    font-size:16px;
    opacity:.95;
}

.tech-info .line3{
    margin-top:4px;
    font-size:16px;
}

.tech-info a{
    color:#e7c79d;
    text-decoration:none;
}

.tech-info a:hover{
    text-decoration:underline;
}

/* 二维码 */

.qrcode-panel{
    position:absolute;

    right:50px;
    bottom:50px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.qrcode{
    width:130px;
    height:130px;

    background:white;

    border-radius:10px;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    box-shadow: 0 4px 12px rgba(0,0,0,.15);
}

.qrcode img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.qrcode-placeholder{
    color:#999;
    font-size:14px;
    padding:8px;
}

.qrcode-text{
    margin-top:12px;
    font-size:15px;
    color:#d5bb98;
}

/* 左上角产品标识 */

.brand{
    position:absolute;
    left:40px;
    top:32px;

    color:#d5bb98;
    font-size:16px;
    letter-spacing:1px;

    opacity:.85;
}

</style>
</head>

<body>

<div class="page">

    <div class="brand">
        精讲课 AI
    </div>

    <div class="title-wrapper">

        <div class="title">
            《爱莲说》精讲
        </div>

        <div class="author">
            周敦颐 · 北宋
        </div>

        <div class="divider"></div>

    </div>

    <div class="qrcode-panel">

        <div class="qrcode">

            <div class="qrcode-placeholder">
                <img src="qrcode.png">
            </div>

        </div>

        <div class="qrcode-text">
            合作联系
        </div>

    </div>

    <div class="tech-info">

        <div class="line1">
            本课程由精讲课AI辅助生成
        </div>

        <div class="line2">
            基于名师课程知识库，结合大模型对讲解风格进行学习与生成
        </div>

        <div class="line3">
            了解生成原理：
            <a href="https://www.jingjiangke.com" target="_blank">
                www.jingjiangke.com
            </a>
        </div>

    </div>

</div>

</body>
</html>
